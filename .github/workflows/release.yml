# FYY CLI Release
# Builds cross-platform binaries and publishes them to GitHub Releases.

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - name: Checkout fyy-src
        uses: actions/checkout@v4
        with:
          repository: feiyueyun/fyy-src
          token: ${{ secrets.FYY_SRC_PAT }}
          path: fyy-src

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build
        working-directory: fyy-src
        run: |
          mkdir -p bin
          VERSION=${{ github.ref_name }}
          COMMIT=${{ github.sha }}
          BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          LDFLAGS="-X main.version=${VERSION} -X main.commit=${COMMIT} -X main.buildTime=${BUILD_TIME}"

          if [ "${{ matrix.goos }}" = "windows" ]; then
            BINARY="bin/fyy-${{ matrix.goos }}-${{ matrix.goarch }}.exe"
          else
            BINARY="bin/fyy-${{ matrix.goos }}-${{ matrix.goarch }}"
          fi

          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -ldflags "$LDFLAGS" -o "$BINARY" ./cmd/fyy/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fyy-${{ matrix.goos }}-${{ matrix.goarch }}
          path: fyy-src/bin/*

  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten and checksum
        run: |
          mkdir dist
          find artifacts -type f -exec cp {} dist/ \;
          cd dist
          sha256sum * > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
